<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentAssist Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.42), transparent 34%),
        linear-gradient(135deg, #fffaf0 0%, #e4f7ff 45%, #f8fbff 100%);
      color: #142033;
      padding: 28px;
    }

    .login-card {
      width: min(1180px, 100%);
      min-height: 680px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      overflow: hidden;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 26px 70px rgba(30, 64, 96, 0.18);
      backdrop-filter: blur(18px);
    }

    .image-panel {
      position: relative;
      min-height: 680px;
      background: #dff5ff;
      overflow: hidden;
    }

    .image-panel img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .image-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(9, 43, 63, 0.02), rgba(9, 43, 63, 0.18));
      pointer-events: none;
    }

    .form-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 52px;
      background:
        linear-gradient(180deg, rgba(255, 250, 240, 0.94), rgba(255, 255, 255, 0.96)),
        linear-gradient(135deg, rgba(125, 211, 252, 0.16), transparent);
    }

    .login-box {
      width: 100%;
      max-width: 390px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 8px;
      background: #e2f6ff;
      color: #0f6786;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    h1 {
      font-size: 38px;
      line-height: 1.12;
      color: #101827;
      margin-bottom: 12px;
      letter-spacing: 0;
    }

    .subtitle {
      color: #627184;
      line-height: 1.6;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .input-group {
      display: grid;
      gap: 8px;
      margin-bottom: 18px;
    }

    label {
      color: #26364a;
      font-size: 13px;
      font-weight: 800;
    }

    input {
      width: 100%;
      min-height: 50px;
      border: 1px solid #d8e7f1;
      border-radius: 8px;
      outline: none;
      background: #f8fcff;
      color: #142033;
      padding: 0 14px;
      font-size: 15px;
      transition: border 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus {
      border-color: #38bdf8;
      background: #ffffff;
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.16);
    }

    .login-btn {
      width: 100%;
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      color: #ffffff;
      background: linear-gradient(135deg, #0ea5e9, #2563eb);
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.24);
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      margin-top: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.3);
    }

    .error {
      min-height: 20px;
      margin: 4px 0 2px;
      color: #c24141;
      font-size: 13px;
      font-weight: 800;
    }

    .credential-box {
      margin-top: 24px;
      padding: 16px;
      border-radius: 8px;
      background: #fffaf0;
      border: 1px solid #f1e4c4;
      color: #5a6472;
      font-size: 13px;
      line-height: 1.65;
    }

    .credential-box strong {
      color: #26364a;
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: #8a96a6;
      font-size: 12px;
    }

    @media (max-width: 920px) {
      body {
        padding: 16px;
      }

      .login-card {
        grid-template-columns: 1fr;
      }

      .image-panel {
        min-height: 320px;
      }

      .form-panel {
        padding: 34px 24px;
      }
    }

    @media (max-width: 520px) {
      .login-card {
        border-radius: 18px;
      }

      h1 {
        font-size: 31px;
      }
    }
  </style>
</head>

<body>
  <main class="login-card">
    <section class="image-panel" aria-label="StudentAssist AI chatbot image">
      <img src="studentassist-login-hero.png" alt="StudentAssist AI chatbot connected with college database">
    </section>

    <section class="form-panel">
      <div class="login-box">
        <span class="eyebrow">College AI Helpdesk</span>
        <h1>Welcome back</h1>
        <p class="subtitle">
          Login once and StudentAssist will open the correct portal for admin or student access.
        </p>

        <form onsubmit="login(event)">
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email" autocomplete="username" required>
          </div>

          <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
          </div>

          <p class="error" id="loginError" role="alert"></p>

          <button type="submit" class="login-btn">Login</button>
        </form>

        <div class="credential-box">
          <strong>Demo credentials</strong><br>
          Admin: admin@college.com / admin123<br>
          Student: student1@college.com / student123<br>
          Student: student2@college.com / student456
        </div>

        <div class="footer-note">© 2026 StudentAssist AI Portal</div>
      </div>
    </section>
  </main>

  <script>
    function login(event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();
      const error = document.getElementById("loginError");

      const adminUsers = [
        { email: "admin@college.com", password: "admin123" },
        { email: "admin@college.edu", password: "admin123" }
      ];

      const studentUsers = [
        { email: "student1@college.com", password: "student123" },
        { email: "student2@college.com", password: "student456" },
        { email: "student3@college.com", password: "student789" },
        { email: "student@college.edu", password: "student123" }
      ];

      const isAdmin = adminUsers.some(user => user.email === email && user.password === password);
      const isStudent = studentUsers.some(user => user.email === email && user.password === password);

      if (isAdmin) {
        localStorage.setItem("userRole", "admin");
        localStorage.setItem("userEmail", email);
        window.location.href = "admin.html";
        return;
      }

      if (isStudent) {
        localStorage.setItem("userRole", "student");
        localStorage.setItem("studentEmail", email);
        window.location.href = "student.html";
        return;
      }

      error.textContent = "Invalid email or password. Please check your credentials.";
    }
  </script>
</body>
</html>
